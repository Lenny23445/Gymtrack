workflows:
  ios-testflight:
    name: MyGymTrack iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_api_key
    environment:
      groups:
        - signing
      node: v22
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Sync iOS
        script: npx cap sync ios

      - name: Add Widget Extension to Xcode project
        script: |
          gem install xcodeproj --no-document
          ruby setup_ios_extensions.rb

      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 -d > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password $CM_CERTIFICATE_PASSWORD

      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          cp MyGymTrack_AppStore.mobileprovision "$PROFILES_HOME/MyGymTrack_AppStore.mobileprovision"
          cp MyGymTrack_Widget_AppStore.mobileprovision "$PROFILES_HOME/MyGymTrack_Widget_AppStore.mobileprovision"
          xcode-project use-profiles

      - name: Set build number
        script: |
          PLIST="ios/App/App/Info.plist"
          WIDGET_PLIST="ios/App/GymTrackWidget/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$WIDGET_PLIST"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "**/*.dSYM.zip"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
