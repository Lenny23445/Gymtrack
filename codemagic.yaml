workflows:
  ios-testflight:
    name: MyGymTrack iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_api_key
    environment:
      groups:
        - signing
      node: v22
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web assets
        script: npm run build

      - name: Sync iOS
        script: npx cap sync ios

      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 -d > /tmp/distribution.p12
          keychain add-certificates --certificate /tmp/distribution.p12 --certificate-password $CM_CERTIFICATE_PASSWORD

      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 -d > "$PROFILE_PATH"
          echo "Installed profile at $PROFILE_PATH"
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
