<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyGymTrack Dashboard</title>
<style>
  :root {
    --bg: #0b0f14;
    --surface: #151b24;
    --surface-2: #1b2430;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #26303d;
    --baseline: #384453;
    --border: rgba(255,255,255,.08);
    --users: #3987e5;      /* Nutzer / Accounts */
    --workouts: #199e70;   /* Workouts */
    --store: #c98500;      /* App Store */
    --extra: #9085e9;      /* Community / Apple */
    --anon: #566374;       /* Anonym (neutral) */
    --premium: #d9a728;    /* Premium / Umsatz */
    --ai: #4fc3d9;         /* KI-Nutzung & Kosten */
    --good: #0ca30c;
    --warn: #fab219;
    --crit: #d03b3b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(600px 400px at 85% -10%, rgba(57,135,229,.14), transparent 70%),
      radial-gradient(500px 380px at -5% 20%, rgba(25,158,112,.10), transparent 70%);
    background-attachment: fixed;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 60px; }

  header { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 22px; }
  header h1 { font-size: 21px; font-weight: 700; letter-spacing: -.02em; }
  .badge { font-size: 12px; color: var(--ink-2); background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 3px 10px; }
  .spacer { flex: 1; }
  button {
    font: 600 13px system-ui, sans-serif; color: var(--ink);
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 7px 13px; cursor: pointer;
  }
  button:hover { background: #232e3d; }
  #stand { font-size: 12.5px; color: var(--muted); }

  section { margin-top: 26px; }
  .sec-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .sec-head h2 { font-size: 15px; font-weight: 700; color: var(--ink); }
  .sec-head .dot { width: 9px; height: 9px; border-radius: 3px; flex: none; align-self: center; }
  .sec-head .sub { font-size: 12.5px; color: var(--muted); }
  .err {
    font-size: 12.5px; color: var(--crit); background: rgba(208,59,59,.10);
    border: 1px solid rgba(208,59,59,.3); border-radius: 8px; padding: 2px 8px;
  }

  .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 13px 15px 11px;
  }
  .tile .v { font-size: 26px; font-weight: 700; letter-spacing: -.02em; }
  .tile .l { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
  .tile .s { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .tile.hero .v { color: var(--tint, var(--ink)); }

  .cards { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 10px; }
  @media (max-width: 860px) { .cards { grid-template-columns: 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 15px 16px 12px; min-width: 0;
  }
  .card h3 { font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
  .card h3 .tbl-btn { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 1px 7px; }
  .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px; flex: none; }

  svg text { font: 10.5px system-ui, sans-serif; fill: var(--muted); }
  svg .dl { font-weight: 600; fill: var(--ink-2); }
  .bar { transition: opacity .1s; }
  .bar:hover { opacity: .75; }

  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { text-align: right; padding: 3px 8px; color: var(--ink-2); font-variant-numeric: tabular-nums; border-bottom: 1px solid var(--grid); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--muted); font-weight: 600; }
  .tblwrap { max-height: 220px; overflow: auto; }

  .hbar-row { display: grid; grid-template-columns: minmax(90px, 40%) 1fr 34px; align-items: center; gap: 8px; margin: 6px 0; font-size: 12.5px; }
  .hbar-row .n { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hbar-row .t { height: 12px; border-radius: 4px; background: var(--surface-2); overflow: hidden; }
  .hbar-row .f { height: 100%; border-radius: 4px; display: block; }
  .hbar-row .c { color: var(--ink-2); font-variant-numeric: tabular-nums; text-align: right; }

  .stack { display: flex; height: 16px; border-radius: 6px; overflow: hidden; gap: 2px; background: var(--bg); margin: 8px 0 10px; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 16px; font-size: 12.5px; color: var(--ink-2); }
  .legend .sw { margin-right: 6px; vertical-align: -1px; }

  .note {
    font-size: 12.5px; color: var(--ink-2); background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--warn); border-radius: 10px; padding: 9px 13px; margin-top: 10px; line-height: 1.55;
  }
  .note.info { border-left-color: var(--users); }
  .note code { background: var(--surface-2); border-radius: 5px; padding: 1px 6px; font-size: 12px; }

  .hero {
    margin-top: 4px;
    background: linear-gradient(135deg, rgba(25,158,112,.16), rgba(57,135,229,.08) 55%, rgba(201,133,0,.12));
    border: 1px solid var(--border); border-radius: 22px; padding: 16px 22px 20px; overflow: hidden;
  }
  .hero-top {
    display: flex; justify-content: flex-end; align-items: center; gap: 7px; margin-bottom: 4px;
    font-size: 11px; font-weight: 700; color: var(--ink-2); letter-spacing: .06em; text-transform: uppercase;
  }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  @media (max-width: 760px) { .hero-grid { grid-template-columns: 1fr; gap: 18px; } }
  .pulse, .dot-live {
    width: 9px; height: 9px; border-radius: 50%; background: var(--good); display: inline-block;
    box-shadow: 0 0 0 0 rgba(12,163,12,.6); animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(12,163,12,.55); }
    70% { box-shadow: 0 0 0 11px rgba(12,163,12,0); }
    100% { box-shadow: 0 0 0 0 rgba(12,163,12,0); }
  }
  .hero-stat { display: flex; flex-direction: column; gap: 3px; }
  .hero-stat .cap { font-size: 12.5px; font-weight: 600; color: var(--ink-2); display: flex; align-items: center; gap: 7px; }
  .hero-stat .big { font-size: 54px; font-weight: 800; letter-spacing: -.03em; line-height: 1.02; }
  .hero-stat.gold .big { color: var(--store); }
  .hero-stat.green .big { color: var(--good); }
  .hero-stat .big .delta { font-size: 20px; font-weight: 700; vertical-align: 12px; margin-left: 8px; color: var(--good); }
  .hero-stat .sub { font-size: 12.5px; color: var(--muted); margin-top: 1px; }

  #tooltip {
    position: fixed; pointer-events: none; z-index: 10; display: none;
    background: #060a0f; border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 9px; font-size: 12px; color: var(--ink); white-space: nowrap;
    box-shadow: 0 6px 18px rgba(0,0,0,.5);
  }
  #tooltip .tv { font-weight: 700; }
  footer { margin-top: 34px; font-size: 12px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
  .src-ok { color: var(--good); } .src-err { color: var(--crit); }

  #login {
    position: fixed; inset: 0; z-index: 50; background: var(--bg);
    display: flex; align-items: center; justify-content: center; text-align: center;
    background-image:
      radial-gradient(600px 400px at 85% -10%, rgba(57,135,229,.14), transparent 70%),
      radial-gradient(500px 380px at -5% 20%, rgba(25,158,112,.10), transparent 70%);
  }
  #login .box { max-width: 340px; padding: 30px; }
  #login h2 { font-size: 20px; margin-bottom: 8px; }
  #login p { font-size: 13px; color: var(--ink-2); margin-bottom: 18px; }
  #login button { font-size: 14px; padding: 10px 18px; }
  #loginMsg { margin-top: 14px; font-size: 12.5px; color: var(--crit); }
</style>
</head>
<body>
<div id="login">
  <div class="box">
    <h2>MyGymTrack Dashboard</h2>
    <p>Live-Zahlen der App. Zugang nur für den Admin-Account.</p>
    <button id="loginBtn">Mit Google anmelden</button>
    <div id="loginMsg"></div>
  </div>
</div>
<div class="wrap">
  <header>
    <h1>MyGymTrack Dashboard</h1>
    <span class="badge" id="proj">…</span>
    <span class="spacer"></span>
    <span id="stand">lädt …</span>
    <button onclick="load()">Aktualisieren</button>
    <button id="logoutBtn" title="Abmelden">Abmelden</button>
  </header>
  <div id="main">Lade Daten …</div>
  <footer id="foot"></footer>
</div>
<div id="tooltip"></div>

<script>
'use strict';
const $ = (s) => document.querySelector(s);
const nf = new Intl.NumberFormat('de-DE');
const nfEUR = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' });
const nfUSD = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'USD' });
const fmt = (n) => n == null ? '—' : nf.format(n);
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dShort = (iso) => `${iso.slice(8, 10)}.${iso.slice(5, 7)}.`;
const DAY = 86_400_000;
let REFRESH_AT = 0;

function isoLocal(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function seriesFromMap(map, days) {
  const out = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - i);
    const iso = isoLocal(d);
    out.push({ date: iso, v: map.get(iso) || 0 });
  }
  return out;
}

/* ── Balken-Chart (eine Serie) als SVG ── */
let _cid = 0;
function barChart(series, color, unit) {
  if (!series || !series.length) return '<div style="color:var(--muted);font-size:12.5px">keine Daten</div>';
  const W = 640, H = 150, padL = 32, padB = 18, padT = 14;
  const iw = W - padL - 6, ih = H - padT - padB;
  const max = Math.max(1, ...series.map(p => p.v));
  const bw = iw / series.length;
  const y = (v) => padT + ih - (v / max) * ih;
  let bars = '', labels = '';
  series.forEach((p, i) => {
    const x = padL + i * bw;
    const h = Math.max(p.v > 0 ? 2 : 0, (p.v / max) * ih);
    bars += `<rect class="bar" x="${(x + 1).toFixed(1)}" y="${(padT + ih - h).toFixed(1)}" width="${Math.max(1, bw - 2).toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${color}" data-d="${p.date}" data-v="${p.v}"/>`;
    if (i % Math.ceil(series.length / 8) === 0) {
      labels += `<text x="${(x + bw / 2).toFixed(1)}" y="${H - 4}" text-anchor="middle">${dShort(p.date)}</text>`;
    }
  });
  const maxI = series.reduce((mi, p, i) => p.v > series[mi].v ? i : mi, 0);
  let dl = '';
  for (const i of new Set([maxI, series.length - 1])) {
    const p = series[i];
    if (p.v > 0) dl += `<text class="dl" x="${(padL + i * bw + bw / 2).toFixed(1)}" y="${(y(p.v) - 4).toFixed(1)}" text-anchor="middle">${fmt(p.v)}</text>`;
  }
  const gy = y(max);
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block" role="img" aria-label="${esc(unit)} pro Tag">
    <line x1="${padL}" y1="${gy}" x2="${W - 6}" y2="${gy}" stroke="var(--grid)" stroke-dasharray="3 4"/>
    <text x="${padL - 5}" y="${gy + 4}" text-anchor="end">${fmt(max)}</text>
    <line x1="${padL}" y1="${padT + ih}" x2="${W - 6}" y2="${padT + ih}" stroke="var(--baseline)"/>
    <text x="${padL - 5}" y="${padT + ih + 4}" text-anchor="end">0</text>
    ${bars}${dl}${labels}
  </svg></div>`;
}

function chartCard(title, series, color, unit, wide = false) {
  const tid = 'tbl' + (++_cid);
  const rows = (series || []).filter(p => p.v > 0).slice().reverse()
    .map(p => `<tr><td>${p.date}</td><td>${fmt(p.v)}</td></tr>`).join('');
  return `<div class="card"${wide ? ' style="grid-column:1/-1"' : ''}><h3><span class="sw" style="background:${color}"></span>${esc(title)}
      <button class="tbl-btn" onclick="const t=document.getElementById('${tid}');t.style.display=t.style.display==='none'?'block':'none'">Tabelle</button></h3>
    ${barChart(series, color, unit)}
    <div id="${tid}" class="tblwrap" style="display:none;margin-top:8px"><table><tr><th>Tag</th><th>${esc(unit)}</th></tr>${rows || '<tr><td colspan="2">keine Einträge</td></tr>'}</table></div>
  </div>`;
}

const tile = (v, label, sub = '', tint = '') =>
  `<div class="tile${tint ? ' hero' : ''}"${tint ? ` style="--tint:${tint}"` : ''}><div class="v">${v}</div><div class="l">${esc(label)}</div>${sub ? `<div class="s">${esc(sub)}</div>` : ''}</div>`;

const secHead = (color, title, sub, errObj) =>
  `<div class="sec-head"><span class="dot" style="background:${color}"></span><h2>${esc(title)}</h2>
   ${sub ? `<span class="sub">${esc(sub)}</span>` : ''}
   ${errObj && errObj.ok === false ? `<span class="err">Fehler: ${esc(errObj.error || '?')}</span>` : ''}</div>`;

/* ── Rendern (identisch zum lokalen Dashboard) ── */
function render(D) {
  $('#proj').textContent = D.project || '—';
  const A = D.auth || {}, S = D.sync || {}, C = D.community || {}, T = D.tracking || {}, AS = D.appstore || {}, AI = D.ai || {};
  let h = '';

  /* Hero: echte Echtzeit-Zahlen (jetzt in App / jetzt im Training) + Downloads */
  const dl = (AS.ok && AS.configured && AS.apps && AS.apps[0]) ? AS.apps[0] : null;
  const activeNow = S.ok ? (S.active5m || 0) : 0;
  const liveTrain = C.ok ? (C.liveNow || 0) : 0;
  const activeToday = S.ok ? (S.active24h || 0) : 0;
  h += `<div class="hero">
    <div class="hero-top"><span class="pulse"></span><span id="liveTxt">Live</span></div>
    <div class="hero-grid">
      <div class="hero-stat green">
        <div class="cap"><span class="dot-live"></span>Jetzt in der App</div>
        <div class="big">${fmt(activeNow)}</div>
        <div class="sub">aktiv in den letzten 5 Min · Echtzeit${activeToday ? ` · ${fmt(activeToday)} heute` : ''}</div>
      </div>
      <div class="hero-stat green">
        <div class="cap"><span class="dot-live"></span>Jetzt im Training</div>
        <div class="big">${fmt(liveTrain)}</div>
        <div class="sub">trainieren gerade · Echtzeit</div>
      </div>
      <div class="hero-stat gold">
        <div class="cap">📲 Downloads gesamt</div>
        <div class="big">${dl ? fmt(dl.downloadsTotal) : '—'}${dl && dl.downloads7 ? `<span class="delta">+${fmt(dl.downloads7)}</span>` : ''}</div>
        <div class="sub">${dl ? `+${fmt(dl.downloads7)} in 7 Tagen · App Store (nur Tageswerte)` : 'App Store nicht verbunden'}</div>
      </div>
    </div>
  </div>`;

  /* Nutzer */
  h += `<section>${secHead('var(--users)', 'Nutzer', 'Firebase Auth + Cloud-Sync', A.ok ? (S.ok ? null : S) : A)}<div class="tiles">`;
  if (A.ok) h += tile(fmt(A.total), 'Accounts gesamt', 'Firebase Auth', 'var(--users)')
    + tile('+' + fmt(A.new7), 'Neu · 7 Tage')
    + tile('+' + fmt(A.new30), 'Neu · 30 Tage');
  if (S.ok) h += tile(fmt(S.total), 'Cloud-Sync-Nutzer', 'users-Dokumente')
    + tile(fmt(S.active24h), 'Aktiv heute', 'Sync in 24 h')
    + tile(fmt(S.active7d), 'Aktiv · 7 Tage')
    + tile(fmt(S.active30d), 'Aktiv · 30 Tage')
    + tile(fmt(S.active5m), 'Gerade aktiv', 'Sync < 5 Min', S.active5m > 0 ? 'var(--good)' : '');
  h += `</div><div class="cards">`;
  if (A.ok) {
    h += chartCard('Neuregistrierungen pro Tag (60 Tage)', A.signupsByDay, 'var(--users)', 'Accounts');
    const provs = [['Anonym', A.anon, 'var(--anon)'], ['Google', A.google, 'var(--users)'], ['Apple', A.apple, 'var(--extra)']];
    if (A.other) provs.push(['Andere', A.other, 'var(--store)']);
    const total = Math.max(1, A.total);
    h += `<div class="card"><h3>Anmelde-Art</h3>
      <div class="stack">${provs.filter(p => p[1] > 0).map(p => `<div style="flex:${p[1]} 0 0;background:${p[2]}" title="${p[0]}: ${fmt(p[1])}"></div>`).join('')}</div>
      <div class="legend">${provs.map(p => `<span><span class="sw" style="background:${p[2]}"></span>${p[0]} <b>${fmt(p[1])}</b> (${Math.round(p[1] / total * 100)} %)</span>`).join('')}</div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:10px">Anonyme Accounts = App genutzt ohne Login (Auto-Anmeldung beim ersten Start).</div>
    </div>`;
  }
  h += `</div></section>`;

  /* Workouts */
  if (S.ok && S.workouts) {
    const W = S.workouts;
    h += `<section>${secHead('var(--workouts)', 'Workouts', 'aus den Cloud-Sync-Daten aller Nutzer — live', null)}<div class="tiles">`;
    h += tile(fmt(W.total), 'Workouts gesamt', '', 'var(--workouts)')
      + tile(fmt(W.last7), 'Workouts · 7 Tage')
      + tile(fmt(W.last30), 'Workouts · 30 Tage')
      + tile(fmt(W.trainers7), 'Trainierende · 7 Tage')
      + tile(W.avgDurMin ? W.avgDurMin + ' min' : '—', 'Ø Dauer', 'letzte 30 Tage')
      + tile(fmt(W.sets30), 'Sätze · 30 Tage')
      + (S.streaks && S.streaks.active ? tile(fmt(S.streaks.active), 'Aktive Streaks', 'max. ' + S.streaks.max) : '');
    h += `</div><div class="cards">`;
    h += chartCard('Workouts pro Tag (60 Tage)', W.byDay, 'var(--workouts)', 'Workouts');
    const maxN = Math.max(1, ...(W.topExercises || []).map(e => e.n));
    h += `<div class="card"><h3>Top-Übungen (30 Tage)</h3>${
      (W.topExercises || []).map(e => `<div class="hbar-row"><span class="n" title="${esc(e.name)}">${esc(e.name)}</span><span class="t"><span class="f" style="width:${Math.round(e.n / maxN * 100)}%;background:var(--workouts)"></span></span><span class="c">${fmt(e.n)}</span></div>`).join('') || '<div style="color:var(--muted);font-size:12.5px">keine Daten</div>'
    }<div style="font-size:11.5px;color:var(--muted);margin-top:8px">Anzahl Workouts (30 Tage), in denen die Übung vorkam.</div></div>`;
    h += `</div></section>`;
  }

  /* Community */
  h += `<section>${secHead('var(--extra)', 'Community', 'Freunde-Feature (Opt-in) — live', C.ok ? null : C)}<div class="tiles">`;
  if (C.ok) h += tile(fmt(C.profiles), 'Öffentliche Profile', '', 'var(--extra)')
    + tile(fmt(C.liveNow), 'Live im Training', 'laut Profil-Status', C.liveNow > 0 ? 'var(--good)' : '')
    + tile(fmt(C.requests), 'Freundschaftsanfragen', 'Dokumente gesamt');
  h += `</div></section>`;

  /* Session-Tracking */
  h += `<section>${secHead('var(--users)', 'Session-Tracking', 'analytics_sessions — In-App-Nutzung, live', T.ok ? null : T)}`;
  if (T.ok) {
    h += `<div class="tiles">`
      + tile(fmt(T.dauToday), 'Aktive Nutzer heute', 'getrackt (DAU)', 'var(--users)')
      + tile(fmt(T.sessionsToday), 'Sessions heute')
      + tile(fmt(T.users7), 'Nutzer · 7 Tage')
      + tile(fmt(T.sessions7), 'Sessions · 7 Tage')
      + tile(T.avgSessionMin ? T.avgSessionMin + ' min' : '—', 'Ø Session-Dauer', '7 Tage');
    h += `</div><div class="cards">`;
    h += chartCard('Getrackte aktive Nutzer pro Tag', T.dauByDay, 'var(--users)', 'Nutzer');
    h += `<div class="card"><h3>Einordnung</h3><div class="note info" style="margin-top:0">Das Session-Tracking war bis <b>${esc(T.fixDate || '')}</b> kaputt: eine Firestore-Rule blockte alle Nutzer außer dem Admin — es wurde nur <b>1 Nutzer</b> erfasst. Seit dem Fix zählt es jeden mit aktueller App-Version; die Zahlen hier wachsen mit der Update-Verbreitung. Die Abschnitte <b>Nutzer</b> und <b>Workouts</b> oben sind davon unabhängig und vollständig.</div></div>`;
    h += `</div>`;
  }
  h += `</section>`;

  /* Premium & Umsatz */
  if (T.ok && T.premium) {
    const P = T.premium;
    h += `<section>${secHead('var(--premium)', 'Premium & Umsatz', 'analytics_users — live, geschätzt', null)}<div class="tiles">`
      + tile(fmt(P.total), 'Premium-Nutzer', 'aktuell aktiv', 'var(--premium)')
      + tile(fmt(P.monthly), 'davon Monats-Abo', '2,99 €/Monat')
      + tile(fmt(P.yearly), 'davon Jahres-Abo', '19,99 €/Jahr')
      + tile(nfEUR.format(P.mrrEstimate), 'Ø Umsatz/Monat', 'geschätzt, brutto');
    h += `</div><div class="note info">Schätzung aus App-Tracking, <b>nicht</b> Apples offiziellen Zahlen — ohne Apples Provision (15–30&nbsp;%), Steuern, Testphasen oder Rückerstattungen. Echte Zahlen: App Store Connect → Analyse/Abonnements bzw. Zahlungen und Finanzberichte. Bestehende Premium-Nutzer tauchen erst nach ihrer nächsten App-Session hier auf (Feld ist neu).</div></section>`;
  }

  /* KI-Nutzung & Kosten */
  h += `<section>${secHead('var(--ai)', 'KI-Nutzung & Kosten', 'Cloudflare-Worker (Gemini/Claude) — live, geschätzt', AI.ok ? null : AI)}`;
  if (AI.ok) {
    const hasBudget = typeof AI.budgetUsd === 'number' && AI.budgetUsd > 0;
    const pct = hasBudget ? Math.min(100, Math.round((AI.costUsd / AI.budgetUsd) * 100)) : null;
    const pctTint = pct == null ? '' : pct >= 90 ? 'var(--crit)' : pct >= 70 ? 'var(--warn)' : 'var(--ai)';
    h += `<div class="tiles">`
      + tile(fmt(AI.calls), 'KI-Anfragen', 'diesen Monat', 'var(--ai)')
      + tile(fmt(AI.inTok), 'Input-Token', 'diesen Monat')
      + tile(fmt(AI.outTok), 'Output-Token', 'diesen Monat')
      + tile(nfUSD.format(AI.costUsd || 0), 'Geschätzte Kosten', 'diesen Monat')
      + (hasBudget ? tile(pct + ' %', 'Budget-Auslastung', nfUSD.format(AI.costUsd) + ' von ' + nfUSD.format(AI.budgetUsd), pctTint) : '');
    h += `</div><div class="note info">Schätzung auf Basis der im Worker hinterlegten Listenpreise (PRICE_IN_PER_M/PRICE_OUT_PER_M) — keine offizielle Abrechnung. ${
      hasBudget
        ? `Bei Erreichen des Monatsbudgets (${nfUSD.format(AI.budgetUsd)}) blockt der Worker automatisch weitere KI-Calls für alle Nutzer, bis der Monat wechselt.`
        : `Kein globales Monatsbudget gesetzt (Worker-Variable <code>GLOBAL_MONTHLY_USD</code>) — es gelten nur die Pro-Nutzer-Limits, kein Gesamtkosten-Deckel.`
    }</div>`;
  }
  h += `</section>`;

  /* App Store */
  h += `<section>${secHead('var(--store)', 'App Store', 'Downloads aus App Store Connect', AS.ok ? null : AS)}`;
  if (AS.ok && AS.configured) {
    for (const app of AS.apps || []) {
      h += `<div class="tiles" style="margin-bottom:10px">`
        + tile(fmt(app.downloads7), 'Downloads · 7 Tage', app.title, 'var(--store)')
        + tile(fmt(app.downloads30), 'Downloads · 30 Tage')
        + tile(fmt(app.downloadsTotal), 'Downloads · 60 Tage')
        + tile(fmt(app.updates7), 'Updates · 7 Tage')
        + `</div><div class="cards">${chartCard(app.title + ' — Downloads pro Tag', app.series.map(p => ({ date: p.date, v: p.downloads })), 'var(--store)', 'Downloads', true)}</div>`;
    }
    h += `<div class="note">${esc(AS.note || '')}</div>`;
  } else if (AS.ok) {
    h += `<div class="note">Noch nicht verbunden — es fehlen: <b>${(AS.missing || []).map(esc).join('</b>, <b>')}</b>.</div>`;
  }
  h += `</section>`;

  $('#main').innerHTML = h;

  /* Footer: Quellen-Status */
  const src = (name, o) => `<span>${name}: <span class="${o && o.ok ? 'src-ok' : 'src-err'}">${o && o.ok ? '✓' : '✗ ' + esc((o && o.error || '').slice(0, 60))}</span></span>`;
  $('#foot').innerHTML = src('Firebase Auth', A) + src('Firestore users', S) + src('Community', C)
    + src('Tracking', T) + `<span>App Store: <span class="${AS.ok && AS.configured ? 'src-ok' : ''}">${AS.ok && AS.configured ? '✓' : 'nicht konfiguriert'}</span></span>`
    + `<span style="margin-left:auto">Live aus Firebase · Stand ${new Date(D.ts).toLocaleTimeString('de-DE')}</span>`;

  /* Tooltips für Balken */
  const tip = $('#tooltip');
  document.querySelectorAll('rect.bar').forEach(r => {
    r.addEventListener('mousemove', (e) => {
      tip.style.display = 'block';
      tip.innerHTML = `${esc(r.dataset.d)} · <span class="tv">${fmt(Number(r.dataset.v))}</span>`;
      tip.style.left = Math.min(e.clientX + 12, innerWidth - 150) + 'px';
      tip.style.top = (e.clientY - 34) + 'px';
    });
    r.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
  });
}

setInterval(() => {
  if (document.hidden) return;
  if (REFRESH_AT && Date.now() >= REFRESH_AT) { REFRESH_AT = 0; load(); return; }
  if (REFRESH_AT) {
    const secs = Math.max(0, Math.ceil((REFRESH_AT - Date.now()) / 1000));
    $('#stand').textContent = `Stand ${new Date(REFRESH_AT - 300_000).toLocaleTimeString('de-DE')} · Auto-Refresh in ${secs} s`;
    const lt = document.getElementById('liveTxt');
    if (lt) lt.textContent = `Live · in ${secs}s`;
  }
}, 1000);
</script>

<script type="module">
'use strict';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult,
  onAuthStateChanged, signOut,
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';
import {
  getFirestore, collection, doc, getDoc, getDocs, query, where, limit, getCountFromServer,
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

const ADMIN_UID = 'GMm3AlNn1pVRL6cc76opBgnM9sr1';
const TRACKING_FIX_DATE = '2026-07-17';
const AI_WORKER_URL = 'https://gymtrack-ai.wolterlenny362.workers.dev';
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyCwhyqYm8m3R2grLNjE1wf6o4hNSVta6YA',
  authDomain:        'gymtrack-25d39.firebaseapp.com',
  databaseURL:       'https://gymtrack-25d39-default-rtdb.europe-west1.firebasedatabase.app',
  projectId:         'gymtrack-25d39',
  storageBucket:     'gymtrack-25d39.firebasestorage.app',
  messagingSenderId: '404501862861',
  appId:             '1:404501862861:web:07e975faa3923a1dc44c84',
};

const app = initializeApp(FIREBASE_CONFIG);
const fbAuth = getAuth(app);
const db = getFirestore(app);

/* ── Datenquellen (Browser fragt Firestore direkt — live) ── */

// Auth- und App-Store-Aggregate kann der Browser nicht selbst holen (Admin-API / .p8).
// Der Mac-Server schreibt sie nach admin/{auth,appstore}; nur die Admin-UID darf lesen.
const adminDoc = (id) => async () => {
  const s = await getDoc(doc(db, 'admin', id));
  if (!s.exists()) throw new Error(`admin/${id} fehlt — Mac-Server noch nie gelaufen?`);
  const d = JSON.parse(s.data().json);
  d._stand = Number(s.data().updatedAt || 0);
  if (d.ok === false) throw new Error(d.error || 'Quelle meldet Fehler');
  return d;
};

async function usersStats() {
  const snap = await getDocs(collection(db, 'users'));
  const now = Date.now();
  let active5m = 0, active24h = 0, active7d = 0, active30d = 0;
  let wkTotal = 0, wk7 = 0, wk30 = 0, sets30 = 0, vol30 = 0;
  const trainers7 = new Set();
  const durations30 = [];
  const wkByDay = new Map();
  const topEx = new Map();
  const versions = new Map();
  let streakActive = 0, streakMax = 0;

  for (const d of snap.docs) {
    const uid = d.id;
    const f = d.data() || {};
    const updatedAt = Number(f.updatedAt || 0);
    if (updatedAt) {
      const age = now - updatedAt;
      if (age < 5 * 60_000) active5m++;
      if (age < DAY) active24h++;
      if (age < 7 * DAY) active7d++;
      if (age < 30 * DAY) active30d++;
    }
    if (f.lastSeenVersion) versions.set(String(f.lastSeenVersion), (versions.get(String(f.lastSeenVersion)) || 0) + 1);
    const streak = Number(f.streak || 0);
    if (streak > 0) { streakActive++; streakMax = Math.max(streakMax, streak); }

    const exName = new Map();
    for (const ex of (f.exercises || [])) {
      if (ex && ex.id != null && ex.name) exName.set(String(ex.id), String(ex.name));
    }

    for (const s of (f.sessions || [])) {
      if (!s || !s.date) continue;
      const t = Date.parse(s.date);
      if (!t) continue;
      wkTotal++;
      const age = now - t;
      if (age < 7 * DAY) { wk7++; trainers7.add(uid); }
      if (age < 30 * DAY) {
        wk30++;
        const dur = Number(s.duration || 0);
        if (dur >= 60 && dur <= 6 * 3600) durations30.push(dur);
        const seen = new Set();
        for (const l of (s.logs || [])) {
          if (!l) continue;
          for (const set of (l.sets || [])) {
            if (!set || (!set.w && !set.r)) continue;
            sets30++;
            vol30 += (parseFloat(set.w) || 0) * (parseInt(set.r) || 0);
          }
          const name = exName.get(String(l.exerciseId)) || null;
          if (name && !seen.has(name)) { seen.add(name); topEx.set(name, (topEx.get(name) || 0) + 1); }
        }
      }
      if (age < 90 * DAY) {
        const iso = isoLocal(new Date(t));
        wkByDay.set(iso, (wkByDay.get(iso) || 0) + 1);
      }
    }
  }

  const avgDurMin = durations30.length
    ? Math.round(durations30.reduce((a, b) => a + b, 0) / durations30.length / 60) : 0;

  return {
    total: snap.size,
    active5m, active24h, active7d, active30d,
    workouts: {
      total: wkTotal, last7: wk7, last30: wk30,
      byDay: seriesFromMap(wkByDay, 60),
      avgDurMin, sets30, vol30: Math.round(vol30),
      trainers7: trainers7.size,
      topExercises: [...topEx.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6)
        .map(([name, n]) => ({ name, n })),
    },
    versions: [...versions.entries()].sort((a, b) => b[1] - a[1]).map(([v, n]) => ({ v, n })),
    streaks: { active: streakActive, max: streakMax },
  };
}

async function communityStats() {
  const [profiles, reqCount] = await Promise.all([
    getDocs(collection(db, 'profiles')),
    getCountFromServer(collection(db, 'requests')),
  ]);
  let liveNow = 0;
  for (const d of profiles.docs) {
    const live = d.data().live;
    if (live === true || (live && typeof live === 'object' && (live.on || live.active))) liveNow++;
  }
  return { profiles: profiles.size, liveNow, requests: reqCount.data().count };
}

async function trackingStats() {
  const since = new Date(Date.now() - 7 * DAY);
  const [snap, userSnap] = await Promise.all([
    getDocs(query(collection(db, 'analytics_sessions'), where('start', '>=', since), limit(20000))),
    getDocs(collection(db, 'analytics_users')),
  ]);
  const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
  const sessions = snap.docs.map(r => {
    const f = r.data();
    const st = f.start;
    const ms = st && typeof st.toMillis === 'function' ? st.toMillis() : Number(st) || 0;
    return { uid: f.uid || '?', start: ms, durSec: Number(f.duration || 0) };
  });
  const today = sessions.filter(s => s.start >= todayStart.getTime());
  const durs = sessions.map(s => s.durSec).filter(d => d > 0 && d < 6 * 3600);
  const dauByDay = new Map();
  for (const s of sessions) {
    const iso = isoLocal(new Date(s.start));
    if (!dauByDay.has(iso)) dauByDay.set(iso, new Set());
    dauByDay.get(iso).add(s.uid);
  }
  let premMonthly = 0, premYearly = 0;
  for (const d of userSnap.docs) {
    const f = d.data();
    if (!f.isPremium) continue;
    if (f.premPlan === 'yearly') premYearly++; else premMonthly++;
  }
  return {
    fixDate: TRACKING_FIX_DATE,
    dauToday: new Set(today.map(s => s.uid)).size,
    sessionsToday: today.length,
    sessions7: sessions.length,
    users7: new Set(sessions.map(s => s.uid)).size,
    avgSessionMin: durs.length ? Math.round(durs.reduce((a, b) => a + b, 0) / durs.length / 60 * 10) / 10 : 0,
    dauByDay: [...dauByDay.entries()].sort().map(([date, set]) => ({ date, v: set.size })),
    premium: {
      total: premMonthly + premYearly, monthly: premMonthly, yearly: premYearly,
      mrrEstimate: premMonthly * 2.99 + premYearly * (19.99 / 12),
    },
  };
}

// Worker prüft die Admin-UID selbst (verifyFirebaseToken + FOUNDER_UID-Check in
// worker.js) — hier reicht der normale idToken, kein Secret im Dashboard nötig.
async function aiStats() {
  const idToken = await fbAuth.currentUser.getIdToken();
  const res = await fetch(AI_WORKER_URL + '/stats?idToken=' + encodeURIComponent(idToken));
  const data = await res.json().catch(() => null);
  if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
  return data;
}

window.load = async () => {
  $('#stand').textContent = 'lädt …';
  const wrap = async (fn) => {
    try { return { ok: true, ...(await fn()) }; }
    catch (e) { return { ok: false, error: String(e.message || e).slice(0, 250) }; }
  };
  const [auth, sync, community, tracking, appstore, ai] = await Promise.all([
    wrap(adminDoc('auth')),
    wrap(usersStats),
    wrap(communityStats),
    wrap(trackingStats),
    wrap(adminDoc('appstore')),
    wrap(aiStats),
  ]);
  if (appstore.ok && appstore._stand) {
    appstore.note = (appstore.note || '') + ` — übermittelt vom Mac: ${new Date(appstore._stand).toLocaleString('de-DE')}`;
  }
  render({ ts: Date.now(), project: FIREBASE_CONFIG.projectId, auth, sync, community, tracking, appstore, ai });
  REFRESH_AT = Date.now() + 300_000;
};

/* ── Login ── */
const provider = new GoogleAuthProvider();
$('#loginBtn').addEventListener('click', async () => {
  $('#loginMsg').textContent = '';
  try { await signInWithPopup(fbAuth, provider); }
  catch (e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/operation-not-supported-in-this-environment' || e.code === 'auth/cancelled-popup-request') {
      try { await signInWithRedirect(fbAuth, provider); } catch (e2) { $('#loginMsg').textContent = e2.message; }
    } else if (e.code !== 'auth/popup-closed-by-user') $('#loginMsg').textContent = e.message;
  }
});
getRedirectResult(fbAuth).catch(e => { $('#loginMsg').textContent = e.message; });
$('#logoutBtn').addEventListener('click', () => signOut(fbAuth));

onAuthStateChanged(fbAuth, (u) => {
  const overlay = $('#login');
  if (!u) { overlay.style.display = 'flex'; return; }
  if (u.uid !== ADMIN_UID) {
    overlay.style.display = 'flex';
    $('#loginMsg').textContent = `Dieses Konto (${u.email || 'ohne E-Mail'}) hat keinen Zugriff. Bitte mit dem Admin-Google-Konto anmelden.`;
    signOut(fbAuth);
    return;
  }
  overlay.style.display = 'none';
  window.load();
});
</script>
